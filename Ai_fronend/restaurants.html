<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restaurants - HungryMan Delivery Network</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="brand">
        <span class="brand-icon">🚚🍔</span>
        <span>HungryMan Delivery Network</span>
      </a>
      <button class="nav-toggle" id="navToggle" aria-label="Open navigation menu">
        <span></span><span></span><span></span>
      </button>
      <nav class="main-nav" id="mainNav">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="restaurants.html" class="active">Restaurants</a>
        <a href="menu.html">Menu</a>
        <a href="tracking.html">Tracking</a>
        <a href="login.html" class="button button-secondary">Sign In</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="section section-dark restaurants-hero">
      <div class="container">
        <div class="hero-copy">
          <p class="eyebrow">Restaurants</p>
          <h1>Choose your favorite kitchen</h1>
          <p>Discover top restaurants with fast delivery times and great reviews.</p>
        </div>
        <div class="search-bar">
          <input id="restaurantSearch" type="search" placeholder="Search restaurants" />
          <select id="restaurantCategory" aria-label="Category filter">
            <option value="all">All categories</option>
            <option value="fast food">Fast Food</option>
            <option value="local">Local</option>
            <option value="seafood">Seafood</option>
            <option value="sushi">Sushi</option>
          </select>
        </div>
      </div>
    </section>

    <section class="section container">
      <div id="restaurantList" class="card-grid restaurant-list"></div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>© 2026 HungryMan Delivery Network. All rights reserved.</p>
      <div class="footer-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="menu.html">Menu</a>
      </div>
    </div>
  </footer>

  <div id="toast" class="toast"></div>
  <script src="script.js"></script>
</body>
</html>
